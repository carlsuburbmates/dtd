version: "3.9"

services:
  mongo:
    image: mongo:6
    restart: unless-stopped
    ports: ["27017:27017"]
    volumes: ["mongo-data:/data/db"]

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on: [mongo]
    environment:
      MONGO_URL: mongodb://mongo:27017
      DB_NAME: barkbond
      CORS_ORIGINS: "*"
      ADMIN_PASS: ${ADMIN_PASS:-melbourne-bark-2026}
    ports: ["8001:8001"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on: [backend]
    environment:
      REACT_APP_BACKEND_URL: http://localhost:8001
    ports: ["3000:3000"]

volumes:
  mongo-data:
